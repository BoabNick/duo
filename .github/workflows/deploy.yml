name: Deploy DUOPAY to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger VPS deploy webhook
        run: |
          echo "Triggering deployment via webhook..."
          PAYLOAD=$(cat << JSONEOF
          {
            "ref": "refs/heads/main",
            "repository": {"name": "duo"},
            "pusher": {"name": "github-actions"}
          }
          JSONEOF
          )
          
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "${{ secrets.DEPLOY_SECRET }}" | awk '{print "sha256="$2}')
          
          curl -s -X POST "https://moukas.tech/api/deploy" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $SIGNATURE" \
            -d "$PAYLOAD" \
            --max-time 30 \
            -o /tmp/deploy_response.json 2>&1
          
          cat /tmp/deploy_response.json
          echo ""
          echo "Deployment triggered successfully!"
