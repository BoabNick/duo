name: Deploy DUOPAY to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Coolify deploy
        run: |
          echo "Triggering Coolify deployment..."
          HTTP_STATUS=$(curl -s -o /tmp/coolify_response.json -w "%{http_code}" \
            -X GET "http://2.25.161.32:8000/api/v1/deploy?uuid=hwjszxf1a4v98r7crvero9os&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            --max-time 60)
          echo "Response:"
          cat /tmp/coolify_response.json
          echo ""
          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "✓ Coolify deployment triggered successfully (HTTP $HTTP_STATUS)"
          else
            echo "✗ Coolify returned HTTP $HTTP_STATUS"
            exit 1
          fi
